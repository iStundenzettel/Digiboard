/* ---------- Speicher: localStorage (gerätelokal, funktioniert offline) ---------- */
async function ladeDaten() {
  try {
    const roh = localStorage.getItem(STORAGE_KEY);
    if (roh) return { ...STANDARD_DATEN, ...JSON.parse(roh) };
  } catch (e) { /* noch nichts gespeichert */ }
  return STANDARD_DATEN;
}
async function speichereDaten(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
  catch (e) { console.error("Speichern fehlgeschlagen", e); }
}

const heuteName = () => TAGE[new Date().getDay() - 1] || "Montag";
const fachFarbe = (f) => { let h = 0; for (let i = 0; i < f.length; i++) h = (h * 31 + f.charCodeAt(i)) % 997; return FACH_FARBEN[h % FACH_FARBEN.length]; };

/* ---------- Tages-Zufall: gleiche Reihenfolge den ganzen Tag, morgen neu ---------- */
function heutigerSeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}
function seededShuffle(array, seed) {
  const arr = [...array];
  let s = seed || 1;
  const zufall = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(zufall() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ============================================================
   HAUPT-KOMPONENTE
   ============================================================ */
function TafelBaukasten() {
  const [daten, setDaten] = useState(null);
  const [modus, setModus] = useState("tafel");
  const datenRef = useRef(null);

  useEffect(() => {
    ladeDaten().then((d) => { setDaten(d); datenRef.current = d; });
  }, []);

  // Tafel: alle 3 s nach Handy-Änderungen schauen (schneller als vorher)
  useEffect(() => {
    if (modus !== "tafel") return;
    const t = setInterval(async () => {
      const neu = await ladeDaten();
      if (JSON.stringify(neu) !== JSON.stringify(datenRef.current)) { setDaten(neu); datenRef.current = neu; }
    }, 3000);
    return () => clearInterval(t);
  }, [modus]);

  const aktualisiere = useCallback((update) => {
    setDaten((alt) => {
      const neu = typeof update === "function" ? update(alt) : { ...alt, ...update };
      datenRef.current = neu; speichereDaten(neu); return neu;
    });
  }, []);

  if (!daten) return <div style={{ minHeight: "100vh", display: "grid", placeItems: "center", fontFamily: "sans-serif", fontSize: 22 }}>Tafel wird geladen …</div>;

  return (
    <div style={{ fontFamily: "'Baloo 2','Comic Sans MS',cursive,sans-serif", color: "#3A332C" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        button { font-family: inherit; cursor: pointer; }
        input, textarea, select { font-family: inherit; font-size: 16px; }
        @keyframes einblenden { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
        @keyframes spotlightPop { 0%{opacity:0; transform:scale(.75) translateY(14px)} 60%{opacity:1; transform:scale(1.04) translateY(0)} 100%{opacity:1; transform:scale(1) translateY(0)} }
        @keyframes schweben { 0%{opacity:0; transform:translateY(0) scale(.8)} 15%{opacity:1} 100%{opacity:0; transform:translateY(-46px) scale(1.15)} }
        @keyframes glanz { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
        .einblenden { animation: einblenden .3s ease both; }
      `}</style>
      {modus === "tafel"
        ? <Tafel daten={daten} aktualisiere={aktualisiere} zurVerwaltung={() => setModus("verwaltung")} />
        : <Verwaltung daten={daten} aktualisiere={aktualisiere} zurTafel={() => setModus("tafel")} />}
    </div>
  );
}

/* ============================================================
   TAFEL (Smartboard)
   ============================================================ */
function Tafel({ daten, aktualisiere, zurVerwaltung }) {
  const [seiteIdx, setSeiteIdx] = useState(0);
  const [kinderBereich, setKinderBereich] = useState(false);
  const flaecheRef = useRef(null);
  const seite = daten.seiten[Math.min(seiteIdx, daten.seiten.length - 1)];
  const hg = seite.eigenerHintergrund
    ? { css: `url(${seite.eigenerHintergrund}) center/cover no-repeat` }
    : (HINTERGRUENDE[seite.hintergrund] || HINTERGRUENDE.holz);

  const setzePosition = (elId, x, y) => aktualisiere((d) => ({
    ...d,
    seiten: d.seiten.map((s) => s.id !== seite.id ? s : {
      ...s, elemente: s.elemente.map((el) => el.id === elId ? { ...el, x, y } : el),
    }),
  }));
  const setzeElementDaten = (elId, patch) => aktualisiere((d) => ({
    ...d,
    seiten: d.seiten.map((s) => s.id !== seite.id ? s : {
      ...s, elemente: s.elemente.map((el) => el.id === elId ? { ...el, daten: { ...el.daten, ...patch } } : el),
    }),
  }));

  if (kinderBereich) return <KinderBereich daten={daten} schliessen={() => setKinderBereich(false)} />;

  return (
    <div ref={flaecheRef} style={{ position: "fixed", inset: 0, background: hg.css, overflow: "hidden", touchAction: "none" }}>
      {/* Seitenwahl oben rechts */}
      <div style={{ position: "absolute", top: 14, right: 14, display: "flex", gap: 8, zIndex: 50 }}>
        {daten.seiten.map((s, i) => (
          <button key={s.id} onClick={() => setSeiteIdx(i)} title={s.name} style={{
            width: 46, height: 46, borderRadius: 12, fontSize: 20, fontWeight: 800, border: "none",
            background: i === seiteIdx ? daten.farbe : "rgba(255,255,255,.92)",
            color: i === seiteIdx ? "#fff" : "#3A332C", boxShadow: "0 3px 8px rgba(0,0,0,.25)",
          }}>{i + 1}</button>
        ))}
        <button onClick={zurVerwaltung} title="Verwaltung (Handy)" style={{
          width: 46, height: 46, borderRadius: 12, fontSize: 20, border: "none",
          background: "rgba(255,255,255,.92)", boxShadow: "0 3px 8px rgba(0,0,0,.25)",
        }}>⚙️</button>
      </div>

      {/* Klassen-Ecke oben links */}
      <div style={{
        position: "absolute", top: 14, left: 14, zIndex: 50, display: "flex", alignItems: "center", gap: 10,
        background: "rgba(255,255,255,.92)", padding: "8px 16px", borderRadius: 999, boxShadow: "0 3px 8px rgba(0,0,0,.25)",
      }}>
        <span style={{ fontSize: 30 }}>{daten.maskottchen}</span>
        <span style={{ fontWeight: 800, fontSize: 20, color: daten.farbe }}>{daten.klassenname}</span>
      </div>

      {/* Kinder-Bereich-Knopf unten rechts */}
      <button onClick={() => setKinderBereich(true)} style={{
        position: "absolute", bottom: 18, right: 18, zIndex: 50, border: "none", borderRadius: 999,
        padding: "14px 26px", fontSize: 22, fontWeight: 800, background: daten.farbe, color: "#fff",
        boxShadow: "0 5px 14px rgba(0,0,0,.3)",
      }}>{daten.maskottchen} Für euch Kinder</button>

      {/* Elemente */}
      {seite.elemente.map((el) => (
        <ZiehbaresElement key={el.id} el={el} flaecheRef={flaecheRef} speicherePos={setzePosition}>
          <Element el={el} daten={daten} setzeElementDaten={setzeElementDaten} />
        </ZiehbaresElement>
      ))}

      {seite.elemente.length === 0 && (
        <div style={{
          position: "absolute", inset: 0, display: "grid", placeItems: "center",
          color: "rgba(255,255,255,.85)", fontSize: 26, fontWeight: 700, textAlign: "center", padding: 30,
        }}>Diese Tafel ist noch leer.<br />Am Handy (⚙️) Elemente hinzufügen.</div>
      )}
    </div>
  );
}

/* ---------- Ziehen per Finger ---------- */
function ZiehbaresElement({ el, flaecheRef, speicherePos, children }) {
  const [pos, setPos] = useState({ x: el.x, y: el.y });
  const zieht = useRef(null);
  useEffect(() => { setPos({ x: el.x, y: el.y }); }, [el.x, el.y]);

  const start = (e) => {
    if (e.target.closest("button, input, textarea, select")) return;
    const r = flaecheRef.current.getBoundingClientRect();
    zieht.current = { dx: e.clientX - r.left - (pos.x / 100) * r.width, dy: e.clientY - r.top - (pos.y / 100) * r.height };
    e.currentTarget.setPointerCapture(e.pointerId);
  };
  const bewege = (e) => {
    if (!zieht.current) return;
    const r = flaecheRef.current.getBoundingClientRect();
    const x = Math.min(92, Math.max(0, ((e.clientX - r.left - zieht.current.dx) / r.width) * 100));
    const y = Math.min(90, Math.max(0, ((e.clientY - r.top - zieht.current.dy) / r.height) * 100));
    setPos({ x, y });
  };
  const ende = () => { if (zieht.current) { zieht.current = null; speicherePos(el.id, pos.x, pos.y); } };

  return (
    <div
      onPointerDown={start} onPointerMove={bewege} onPointerUp={ende} onPointerCancel={ende}
      style={{ position: "absolute", left: `${pos.x}%`, top: `${pos.y}%`, cursor: "grab", zIndex: 10, userSelect: "none" }}
    >{children}</div>
  );
}

/* ---------- Einzelne Elemente ---------- */
function Element({ el, daten, setzeElementDaten }) {
  switch (el.typ) {
    case "uhr": return <ElUhr digital={el.daten.digital} />;
    case "timer": return <ElTimer farbe={daten.farbe} />;
    case "notiz": return <ElNotiz d={el.daten} />;
    case "ampel": return <ElAmpel stand={el.daten.stand} umschalten={(s) => setzeElementDaten(el.id, { stand: s })} />;
    case "geburtstag": return <ElGeburtstag d={el.daten} farbe={daten.farbe} />;
    case "stundenplan": return <ElStundenplanHeute daten={daten} />;
    case "essen": return <ElEssenHeute daten={daten} />;
    case "punkte": return <ElPunkte daten={daten} />;
    case "gruppen": return <ElGruppen daten={daten} anzahl={el.daten.anzahl || 2} />;
    case "bild": return <ElBild d={el.daten} />;
    case "wuerfel": return <ElWuerfel d={el.daten} farbe={daten.farbe} />;
    case "gluecksrad": return <ElGluecksrad d={el.daten} daten={daten} />;
    case "quiz": return <ElQuiz d={el.daten} farbe={daten.farbe} />;
    case "rechnen": return <ElRechnen d={el.daten} farbe={daten.farbe} />;
    case "galgen": return <ElGalgen d={el.daten} farbe={daten.farbe} />;
    case "sternchallenge": return <ElSternChallenge daten={daten} />;
    case "ehrenwand": return <ElEhrenwand daten={daten} />;
    default: return null;
  }
}

const kartenStil = {
  background: "rgba(255,255,255,.97)", borderRadius: 16, boxShadow: "0 6px 16px rgba(0,0,0,.25)", padding: 16,
};

function ElUhr({ digital }) {
  const [jetzt, setJetzt] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setJetzt(new Date()), 1000); return () => clearInterval(t); }, []);
  if (digital) return (
    <div style={{ ...kartenStil, borderRadius: 999, padding: "14px 28px", fontSize: 40, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>
      {jetzt.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })}
    </div>
  );
  const s = jetzt.getSeconds() * 6, m = jetzt.getMinutes() * 6 + s / 60, h = (jetzt.getHours() % 12) * 30 + m / 12;
  return (
    <div style={{ ...kartenStil, borderRadius: "50%", width: 150, height: 150, padding: 10 }}>
      <svg viewBox="0 0 100 100" style={{ width: "100%", height: "100%" }}>
        <circle cx="50" cy="50" r="47" fill="#fff" stroke="#3A332C" strokeWidth="2.5" />
        {[...Array(12)].map((_, i) => (
          <line key={i} x1="50" y1="8" x2="50" y2={i % 3 === 0 ? 16 : 12} stroke="#3A332C" strokeWidth={i % 3 === 0 ? 3 : 1.5}
            transform={`rotate(${i * 30} 50 50)`} />
        ))}
        <line x1="50" y1="50" x2="50" y2="27" stroke="#3A332C" strokeWidth="4" strokeLinecap="round" transform={`rotate(${h} 50 50)`} />
        <line x1="50" y1="50" x2="50" y2="17" stroke="#3A332C" strokeWidth="2.5" strokeLinecap="round" transform={`rotate(${m} 50 50)`} />
        <line x1="50" y1="52" x2="50" y2="14" stroke="#E8722A" strokeWidth="1.5" strokeLinecap="round" transform={`rotate(${s} 50 50)`} />
        <circle cx="50" cy="50" r="3" fill="#E8722A" />
      </svg>
    </div>
  );
}

function ElTimer({ farbe }) {
  const [rest, setRest] = useState(0);
  const [läuft, setLäuft] = useState(false);
  useEffect(() => {
    if (!läuft || rest <= 0) return;
    const t = setTimeout(() => { setRest((r) => r - 1); if (rest === 1) setLäuft(false); }, 1000);
    return () => clearTimeout(t);
  }, [läuft, rest]);
  const mm = String(Math.floor(rest / 60)).padStart(2, "0"), ss = String(rest % 60).padStart(2, "0");
  return (
    <div style={{ ...kartenStil, borderRadius: "50%", width: 190, height: 190, display: "grid", placeItems: "center", textAlign: "center" }}>
      <div>
        <div style={{ fontSize: 42, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: läuft && rest <= 10 ? "#D64545" : "#3A332C" }}>{mm}:{ss}</div>
        <div style={{ display: "flex", gap: 5, justifyContent: "center", flexWrap: "wrap", marginTop: 6 }}>
          {[1, 5, 10].map((m) => (
            <button key={m} onClick={() => { setRest(m * 60); setLäuft(true); }} style={{
              border: "none", background: farbe, color: "#fff", fontWeight: 800, borderRadius: 999, padding: "5px 10px", fontSize: 14,
            }}>{m}′</button>
          ))}
          <button onClick={() => { setLäuft(false); setRest(0); }} style={{
            border: `2px solid ${farbe}`, background: "#fff", color: farbe, fontWeight: 800, borderRadius: 999, padding: "5px 10px", fontSize: 14,
          }}>■</button>
        </div>
      </div>
    </div>
  );
}

/* ---------- SPIELE ---------- */
const zufall = (n) => Math.floor(Math.random() * (n + 1));

function ElWuerfel({ d, farbe }) {
  const anzahl = d.anzahl || 1;
  const [augen, setAugen] = useState(Array.from({ length: anzahl }, () => 6));
  const [läuft, setLäuft] = useState(false);
  useEffect(() => { setAugen(Array.from({ length: anzahl }, () => 6)); }, [anzahl]);
  const gesichter = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
  const würfeln = () => {
    if (läuft) return;
    setLäuft(true);
    let n = 0;
    const t = setInterval(() => {
      setAugen(Array.from({ length: anzahl }, () => 1 + zufall(5)));
      if (++n > 10) { clearInterval(t); setLäuft(false); }
    }, 80);
  };
  const summe = augen.reduce((a, b) => a + b, 0);
  return (
    <div style={{ ...kartenStil, textAlign: "center", minWidth: 170 }}>
      <div style={{ fontSize: 88, lineHeight: 1, color: "#3A332C", letterSpacing: 6 }}>
        {augen.map((a, i) => <span key={i}>{gesichter[a]}</span>)}
      </div>
      {anzahl > 1 && <div style={{ fontWeight: 800, fontSize: 22, marginTop: 2 }}>Summe: {summe}</div>}
      <button onClick={würfeln} style={{
        marginTop: 8, border: "none", background: farbe, color: "#fff", fontWeight: 800,
        borderRadius: 999, padding: "10px 24px", fontSize: 18,
      }}>{läuft ? "…" : "Würfeln!"}</button>
    </div>
  );
}

function ElGluecksrad({ d, daten }) {
  const eintraege = d.nutzeNamen
    ? daten.schueler.map((s) => s.name)
    : (d.eintraege || []).filter(Boolean);
  const [drehung, setDrehung] = useState(0);
  const [gewinner, setGewinner] = useState(null);
  const [dreht, setDreht] = useState(false);
  const n = Math.max(eintraege.length, 1);
  const seg = 360 / n;
  const rad = (g) => ((g - 90) * Math.PI) / 180;

  const drehen = () => {
    if (dreht || eintraege.length < 2) return;
    setDreht(true); setGewinner(null);
    const ziel = zufall(n - 1) % n;
    const zielRotation = 360 * 5 + (360 - (ziel * seg + seg / 2));
    setDrehung((alt) => alt - (alt % 360) + zielRotation);
    setTimeout(() => { setGewinner(eintraege[ziel]); setDreht(false); }, 4300);
  };

  return (
    <div style={{ ...kartenStil, textAlign: "center", padding: 14 }}>
      <div style={{ position: "relative", width: 210, height: 210, margin: "0 auto" }}>
        <div style={{
          position: "absolute", top: -4, left: "50%", transform: "translateX(-50%)", zIndex: 5,
          width: 0, height: 0, borderLeft: "12px solid transparent", borderRight: "12px solid transparent",
          borderTop: "20px solid #3A332C",
        }} />
        <div style={{
          width: "100%", height: "100%",
          transform: `rotate(${drehung}deg)`,
          transition: dreht ? "transform 4.2s cubic-bezier(.15,.7,.15,1)" : "none",
        }}>
          <svg viewBox="0 0 100 100" style={{ width: "100%", height: "100%" }}>
            {eintraege.length < 2 ? (
              <circle cx="50" cy="50" r="48" fill="#F1E9DC" />
            ) : eintraege.map((e, i) => {
              const a1 = i * seg, a2 = (i + 1) * seg;
              const x1 = 50 + 48 * Math.cos(rad(a1)), y1 = 50 + 48 * Math.sin(rad(a1));
              const x2 = 50 + 48 * Math.cos(rad(a2)), y2 = 50 + 48 * Math.sin(rad(a2));
              const mitte = a1 + seg / 2;
              const tx = 50 + 30 * Math.cos(rad(mitte)), ty = 50 + 30 * Math.sin(rad(mitte));
              return (
                <g key={i}>
                  <path d={`M50 50 L${x1} ${y1} A48 48 0 ${seg > 180 ? 1 : 0} 1 ${x2} ${y2} Z`}
                    fill={FACH_FARBEN[i % FACH_FARBEN.length]} stroke="#fff" strokeWidth="0.8" />
                  <text x={tx} y={ty} fill="#fff" fontSize={n > 10 ? 5 : 6.5} fontWeight="800"
                    textAnchor="middle" dominantBaseline="middle"
                    transform={`rotate(${mitte} ${tx} ${ty})`}>
                    {e.length > 9 ? e.slice(0, 8) + "…" : e}
                  </text>
                </g>
              );
            })}
            <circle cx="50" cy="50" r="7" fill="#3A332C" />
          </svg>
        </div>
      </div>
      <div style={{ minHeight: 34, fontWeight: 800, fontSize: 24, marginTop: 4 }}>
        {gewinner && <>🎉 {gewinner} 🎉</>}
      </div>
      <button onClick={drehen} style={{
        border: "none", background: "#8B5CB8", color: "#fff", fontWeight: 800,
        borderRadius: 999, padding: "10px 26px", fontSize: 18,
      }}>{dreht ? "Es dreht sich …" : "Drehen!"}</button>
      {eintraege.length < 2 && <div style={{ marginTop: 8, color: "#8A7F72", fontSize: 14, fontWeight: 600 }}>Mindestens 2 Einträge am Handy eintragen.</div>}
    </div>
  );
}

function ElRechnen({ d, farbe }) {
  const neueAufgabe = () => {
    const raum = d.raum || 20;
    const op = ["+", "−", "·"][zufall(2)];
    let a, b, erg;
    if (op === "·") { a = 2 + zufall(8); b = 2 + zufall(8); erg = a * b; }
    else if (op === "+") { a = 1 + zufall(raum - 2); b = 1 + zufall(raum - a - 1 > 0 ? raum - a - 1 : 1); erg = a + b; }
    else { a = 2 + zufall(raum - 2); b = 1 + zufall(a - 1); erg = a - b; }
    return { a, b, op, erg };
  };
  const [auf, setAuf] = useState(neueAufgabe);
  const [zeig, setZeig] = useState(false);
  return (
    <div style={{ ...kartenStil, textAlign: "center", minWidth: 250 }}>
      <div style={{ color: "#8A7F72", fontWeight: 700, fontSize: 14 }}>🧮 Kopfrechnen bis {d.raum || 20}</div>
      <div style={{ fontSize: 52, fontWeight: 800, margin: "6px 0" }}>
        {auf.a} {auf.op} {auf.b} = {zeig ? <span style={{ color: "#3E8E5A" }}>{auf.erg}</span> : "?"}
      </div>
      <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
        <button onClick={() => setZeig(true)} style={{
          border: "none", background: "#3E8E5A", color: "#fff", fontWeight: 800,
          borderRadius: 999, padding: "10px 20px", fontSize: 17,
        }}>Antwort</button>
        <button onClick={() => { setAuf(neueAufgabe()); setZeig(false); }} style={{
          border: "none", background: farbe, color: "#fff", fontWeight: 800,
          borderRadius: 999, padding: "10px 20px", fontSize: 17,
        }}>Neue Aufgabe</button>
      </div>
    </div>
  );
}

function ElGalgen({ d, farbe }) {
  const woerter = (d.woerter || []).map((w) => w.trim().toUpperCase()).filter(Boolean);
  const [wort, setWort] = useState("");
  const [geraten, setGeraten] = useState([]);
  useEffect(() => { if (!wort && woerter.length) setWort(woerter[zufall(woerter.length - 1)]); }, [woerter.length]);
  if (woerter.length === 0) return <div style={{ ...kartenStil, color: "#8A7F72" }}>🔤 Wörter am Handy eintragen</div>;

  const falsche = geraten.filter((b) => !wort.includes(b));
  const leben = 6 - falsche.length;
  const gewonnen = wort && [...wort].every((z) => z === " " || z === "-" || geraten.includes(z));
  const verloren = leben <= 0;
  const neu = () => { setWort(woerter[zufall(woerter.length - 1)]); setGeraten([]); };

  return (
    <div style={{ ...kartenStil, width: 380, maxWidth: "88vw", textAlign: "center" }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 800, marginBottom: 8 }}>
        <span>🔤 Wörter raten</span>
        <span>{"❤️".repeat(Math.max(0, leben))}{"🖤".repeat(6 - Math.max(0, leben))}</span>
      </div>
      <div style={{ fontSize: 34, fontWeight: 800, letterSpacing: 6, marginBottom: 10, minHeight: 44 }}>
        {[...wort].map((z, i) =>
          z === " " ? "  " : (geraten.includes(z) || verloren)
            ? <span key={i} style={{ color: verloren && !geraten.includes(z) ? "#E23B3B" : "#3A332C" }}>{z}</span>
            : <span key={i}>_</span>
        ).map((el, i) => <span key={i} style={{ margin: "0 2px" }}>{el}</span>)}
      </div>
      {!gewonnen && !verloren && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(8,1fr)", gap: 4 }}>
          {[..."ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜ"].map((b) => (
            <button key={b} disabled={geraten.includes(b)}
              onClick={() => setGeraten((g) => [...g, b])}
              style={{
                border: "none", borderRadius: 8, padding: "7px 0", fontWeight: 800, fontSize: 16,
                background: geraten.includes(b) ? (wort.includes(b) ? "#57C25B" : "#E5DCCB") : "#F1E9DC",
                color: geraten.includes(b) && wort.includes(b) ? "#fff" : "#3A332C",
                opacity: geraten.includes(b) && !wort.includes(b) ? 0.4 : 1,
              }}>{b}</button>
          ))}
        </div>
      )}
      {(gewonnen || verloren) && (
        <div style={{ fontWeight: 800, fontSize: 22, margin: "6px 0" }}>
          {gewonnen ? "🎉 Gewonnen, super!" : "😿 Verloren – das Wort steht oben."}
        </div>
      )}
      <button onClick={neu} style={{
        marginTop: 8, border: "none", background: farbe, color: "#fff", fontWeight: 800,
        borderRadius: 999, padding: "10px 24px", fontSize: 17,
      }}>Neues Wort</button>
    </div>
  );
}

          <div style={{
            display: "inline-block", marginTop: 6, background: "#FFE9A8", border: "2px solid #D9A400",

          }}>🏆 5 Sterne = {b.wochenBelohnung}</div>
        )}
        {(b.kategorien || []).length > 0 && (
          <div style={{ display: "flex", gap: 6, justifyContent: "center", flexWrap: "wrap", marginTop: 8 }}>

              <span key={i} style={{
                background: "#fff", border: "2px solid #E5DCCB", borderRadius: 999,

              }}>{k}</span>
            ))}
          </div>

        {champions > 0 && (
          <div style={{ marginTop: 8, fontWeight: 800, fontSize: 17, color: "#3E8E5A" }}>
            🎉 Schon {champions} {champions === 1 ? "Kind hat" : "Kinder haben"} alle 5 Sterne geschafft!
          </div>
        )}
      </div>

      {/* Kinder-Raster */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 8 }}>
        {kinder.map((k, idx) => {
          const sterne = Math.min(5, Math.floor(k.punkte / pps));
          const fertig = sterne >= 5;
          const rest = k.punkte % pps;
          const fortschritt = fertig ? 1 : rest / pps;
          return (
            <div key={k.name + idx} style={{
              borderRadius: 14, padding: "10px 10px 8px", textAlign: "center",
              background: fertig ? "linear-gradient(180deg,#FFF3C4,#FFE28A)" : "#fff",
              border: fertig ? "3px solid #D9A400" : "2px solid #EFE6D5",
              boxShadow: fertig ? "0 0 14px rgba(217,164,0,.45)" : "0 2px 5px rgba(0,0,0,.06)",
            }}>
              <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {fertig && "👑 "}{k.name}

              <div style={{ fontSize: 17, letterSpacing: 1 }}>
                {[0, 1, 2, 3, 4].map((i) => (
                  <span key={i} style={{ opacity: i < sterne ? 1 : 0.25 }}>⭐</span>
                ))}
              </div>
              <div style={{ background: "#EFE6D5", borderRadius: 999, height: 8, marginTop: 5, overflow: "hidden" }}>
                <div style={{
                  width: `${fortschritt * 100}%`, height: "100%", borderRadius: 999,
                  background: fertig ? "#D9A400" : "#3E8E5A", transition: "width .5s ease",
                }} />
              </div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#8A7F72", marginTop: 3 }}>
                {fertig ? "Geschafft! 🎉" : `Noch ${pps - rest} bis zum ${sterne + 1}. Stern`}
              </div>
            </div>
          );
        })}
      </div>
      {kinder.length === 0 && (
        <div style={{ textAlign: "center", color: "#8A7F72", fontWeight: 600, padding: 20 }}>
          Noch keine Kinder eingetragen – am Handy unter „Kinder & Punkte" hinzufügen.
        </div>
      )}
    </div>
  );
}

/* ---------- EHRENWAND: rein positive, rotierende Highscore-Anzeige ---------- */
const WACHSTUMS_BADGES = ["🌱", "🌿", "🍀", "🌟", "👑"];

function ElEhrenwand({ daten }) {
  const b = daten.belohnung || {};
  const pps = Math.max(1, b.punkteProStern || 5);
  const sprueche = (b.spruecheLob && b.spruecheLob.length)
    ? b.spruecheLob
    : ["Super gemacht!", "Klasse Einsatz!", "Echt stark!", "Weiter so!", "Toll gemacht!", "Du glänzt! ✨"];

  const seed = heutigerSeed();
  // Reihenfolge ist NICHT nach Punkten sortiert, sondern täglich neu gemischt –
  // so steht nicht immer dasselbe Kind oben. Nur Kinder mit mind. 1 Punkt erscheinen.
  const gemischt = seededShuffle(daten.schueler || [], seed).filter((k) => k.punkte > 0);

  const [spot, setSpot] = useState(0);
  useEffect(() => {
    if (gemischt.length === 0) return;
    const t = setInterval(() => setSpot((i) => (i + 1) % gemischt.length), 4500);
    return () => clearInterval(t);
  }, [gemischt.length]);

  const idx = gemischt.length ? spot % gemischt.length : 0;
  const spotKind = gemischt[idx];
  const spotSpruch = sprueche[(idx + seed) % sprueche.length];
  const funken = [...Array(6)];

  return (
    <div style={{
      width: 780, maxWidth: "94vw", maxHeight: "82vh", overflowY: "auto",
      background: "linear-gradient(165deg, #FFF9EC 0%, #FFF1D2 100%)",
      borderRadius: 22, boxShadow: "0 10px 30px rgba(0,0,0,.28)", padding: 20,
    }}>
      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ fontWeight: 800, fontSize: 28 }}>🏅 Unsere Ehrenwand</div>
        <div style={{ color: "#8A7F72", fontWeight: 700, fontSize: 14 }}>Jeder, der hier steht, hat sich das verdient! ✨</div>
      </div>

      {/* Spotlight: ein Kind nach dem anderen bekommt seinen großen Moment */}
      {gemischt.length > 0 ? (
        <div style={{ position: "relative", display: "grid", placeItems: "center", marginBottom: 20, minHeight: 150 }}>
          {funken.map((_, i) => (
            <span key={i} style={{
              position: "absolute", left: `${12 + i * 14}%`, top: "70%", fontSize: 20,
              animation: `schweben ${2.6 + (i % 3) * 0.5}s ease-in ${i * 0.4}s infinite`,
            }}>✨</span>
          ))}
          <div key={spotKind.name + idx} style={{
            position: "relative", textAlign: "center", background: "linear-gradient(180deg,#FFE9A8,#FFD873)",
            border: "4px solid #D9A400", borderRadius: 20, padding: "18px 40px",
            boxShadow: "0 0 30px rgba(217,164,0,.55)", animation: "spotlightPop .6s cubic-bezier(.2,.8,.2,1) both, glanz 2.4s ease-in-out 0.6s infinite",
          }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#8A6400", letterSpacing: 1 }}>HEUTE IM RAMPENLICHT</div>
            <div style={{ fontSize: 34, fontWeight: 800, margin: "2px 0" }}>{spotKind.name}</div>
            <div style={{ fontSize: 18 }}>
              {WACHSTUMS_BADGES.map((emoji, i) => (
                <span key={i} style={{ opacity: i < Math.min(5, Math.floor(spotKind.punkte / pps)) ? 1 : 0.25, marginRight: 2 }}>{emoji}</span>
              ))}
            </div>
            <div style={{ fontWeight: 700, fontSize: 17, marginTop: 4 }}>{spotSpruch}</div>
          </div>
        </div>
      ) : (
        <div style={{ textAlign: "center", color: "#8A7F72", fontWeight: 700, padding: 24 }}>
          Noch niemand hier – der erste Punkt des Tages füllt die Wand! 🌱
        </div>
      )}

      {/* Wand aller positiven Namen – Reihenfolge wechselt täglich */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px, 1fr))", gap: 8 }}>
        {gemischt.map((k, i) => {
          const stufe = Math.min(5, Math.max(1, Math.floor(k.punkte / pps) || 1));
          const badge = WACHSTUMS_BADGES[stufe - 1];
          const istSpot = i === idx;
          return (
            <div key={k.name} className="einblenden" style={{
              animationDelay: `${i * 0.05}s`, textAlign: "center", borderRadius: 14, padding: "10px 6px",
              background: istSpot ? "#FFF3C4" : "#fff", border: istSpot ? "3px solid #D9A400" : "2px solid #F1E6D2",
              boxShadow: "0 2px 6px rgba(0,0,0,.06)",
            }}>
              <div style={{ fontSize: 26 }}>{badge}</div>
              <div style={{ fontWeight: 800, fontSize: 15, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{k.name}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   KINDER-BEREICH (Vollbild, scrollbar)
   ============================================================ */
function KinderBereich({ daten, schliessen }) {
  const heute = heuteName();
  const rangliste = [...daten.schueler].sort((a, b) => b.punkte - a.punkte);
  const medaillen = ["🥇", "🥈", "🥉"];
  return (
    <div style={{ position: "fixed", inset: 0, background: "#FFF7EC", overflowY: "auto", zIndex: 100 }}>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 18px 60px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 18 }}>
          <div style={{ fontSize: 52 }}>{daten.maskottchen}</div>
          <h1 style={{ flex: 1, margin: 0, fontSize: "clamp(26px,5vw,40px)", fontWeight: 800, color: daten.farbe }}>Euer Bereich</h1>
          <button onClick={schliessen} style={{
            border: "none", borderRadius: 999, padding: "12px 26px", fontSize: 20, fontWeight: 800,
            background: daten.farbe, color: "#fff",
          }}>✕ Zurück</button>
        </div>

        <div className="einblenden" style={{ display: "grid", gap: 16 }}>
          <div style={{ ...kartenStil, padding: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 26, marginBottom: 6 }}>🍽️ Was gibt es heute zu essen?</div>
            <div style={{ fontSize: 24, fontWeight: 700, color: daten.farbe }}>{daten.essensplan[heute] || "—"}</div>
            <div style={{ marginTop: 12, display: "grid", gap: 6 }}>
              {TAGE.map((t) => (
                <div key={t} style={{ display: "flex", gap: 12, fontSize: 17, fontWeight: t === heute ? 800 : 600, opacity: t === heute ? 1 : 0.6 }}>
                  <span style={{ minWidth: 110 }}>{t}:</span><span>{daten.essensplan[t] || "—"}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ ...kartenStil, padding: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 26, marginBottom: 10 }}>📅 Stundenplan heute ({heute})</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {(daten.stundenplan[heute] || []).map((f, i) => (
                <div key={i} style={{ background: fachFarbe(f), color: "#fff", fontWeight: 800, padding: "12px 18px", borderRadius: 14, fontSize: 20 }}>{i + 1}. {f}</div>
              ))}
            </div>
          </div>

          <div style={{ ...kartenStil, padding: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 26, marginBottom: 10 }}>⭐ Wer hat die meisten Punkte?</div>
            <div style={{ display: "grid", gap: 8 }}>
              {rangliste.map((s, i) => (
                <div key={s.name} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  background: i < 3 ? "#FFF3E0" : "#FAF5EC", borderRadius: 12, padding: "10px 16px",
                  fontSize: 20, fontWeight: 700,
                }}>
                  <span>{medaillen[i] || `${i + 1}.`} {s.name}</span>
                  <span style={{ color: daten.farbe, fontWeight: 800 }}>{s.punkte} ⭐</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ ...kartenStil, padding: 22 }}>
            <div style={{ fontWeight: 800, fontSize: 26, marginBottom: 10 }}>🎯 Unsere Ziele</div>
            {daten.ziele.map((z, i) => (
              <div key={i} style={{ fontSize: 20, fontWeight: 700, padding: "6px 0" }}>{i + 1}. {z}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   VERWALTUNG (Handy)
   ============================================================ */
function Verwaltung({ daten, aktualisiere, zurTafel }) {
  const [offen, setOffen] = useState("seiten");
  const [seiteId, setSeiteId] = useState(daten.seiten[0]?.id);
  const seite = daten.seiten.find((s) => s.id === seiteId) || daten.seiten[0];

  const eingabe = { width: "100%", padding: "11px 13px", borderRadius: 12, border: "2px solid #E5DCCB", marginBottom: 10, background: "#FFFCF6" };
  const beschriftung = { fontWeight: 700, fontSize: 13, color: "#8A7F72", display: "block", marginBottom: 4 };
  const knopf = { border: "none", background: daten.farbe, color: "#fff", fontWeight: 800, borderRadius: 12, padding: "11px 16px", fontSize: 15 };

  const Abschnitt = ({ id, titel, emoji, children }) => (
    <div style={{ background: "#fff", borderRadius: 16, marginBottom: 10, overflow: "hidden", boxShadow: "0 3px 0 rgba(0,0,0,.05)" }}>
      <button onClick={() => setOffen(offen === id ? null : id)} style={{
        width: "100%", textAlign: "left", padding: "15px 16px", fontSize: 18, fontWeight: 800,
        background: "none", border: "none", display: "flex", justifyContent: "space-between", color: "#3A332C",
      }}><span>{emoji} {titel}</span><span>{offen === id ? "▲" : "▼"}</span></button>
      {offen === id && <div style={{ padding: "0 16px 16px" }}>{children}</div>}
    </div>
  );

  const bearbeiteSeite = (patch) => aktualisiere((d) => ({
    ...d, seiten: d.seiten.map((s) => s.id === seite.id ? { ...s, ...patch } : s),
  }));
  const bearbeiteElement = (elId, patchDaten) => aktualisiere((d) => ({
    ...d, seiten: d.seiten.map((s) => s.id !== seite.id ? s : {
      ...s, elemente: s.elemente.map((el) => el.id === elId ? { ...el, daten: { ...el.daten, ...patchDaten } } : el),
    }),
  }));
  const löscheElement = (elId) => aktualisiere((d) => ({
    ...d, seiten: d.seiten.map((s) => s.id !== seite.id ? s : { ...s, elemente: s.elemente.filter((el) => el.id !== elId) }),
  }));

  /* ---- Galerie: fertige Elemente aufbewahren & wiederverwenden ---- */
  const speichereInGalerie = (el) => {
    const name =
      el.typ === "notiz" ? (el.daten.titel || "Notiz") :
      el.typ === "geburtstag" ? `Geburtstag${el.daten.name ? " " + el.daten.name : ""}` :
      ELEMENT_TYPEN[el.typ].name;
    aktualisiere((d) => ({
      ...d, galerie: [...(d.galerie || []), { id: neueId(), name, typ: el.typ, daten: { ...el.daten } }],
    }));
  };
  const ausGalerieEinfuegen = (vorlage) => aktualisiere((d) => ({
    ...d, seiten: d.seiten.map((s) => s.id !== seite.id ? s : {
      ...s, elemente: [...s.elemente, {
        id: neueId(), typ: vorlage.typ, x: 30 + Math.random() * 20, y: 25 + Math.random() * 20,
        daten: { ...vorlage.daten },
      }],
    }),
  }));
  const galerieUmbenennen = (vId, name) => aktualisiere((d) => ({
    ...d, galerie: (d.galerie || []).map((v) => v.id === vId ? { ...v, name } : v),
  }));
  const galerieLöschen = (vId) => aktualisiere((d) => ({
    ...d, galerie: (d.galerie || []).filter((v) => v.id !== vId),
  }));

  /* ---- Seiten-Galerie: komplette Tafelseiten als Vorlage ---- */
  const speichereSeiteInGalerie = () => aktualisiere((d) => ({
    ...d, seitenGalerie: [...(d.seitenGalerie || []), {
      id: neueId(), name: seite.name, hintergrund: seite.hintergrund,
      eigenerHintergrund: seite.eigenerHintergrund,
      elemente: seite.elemente.map((el) => ({ ...el, daten: { ...el.daten } })),
    }],
  }));
  const seiteAusGalerieEinfuegen = (vorlage) => {
    const neu = {
      id: neueId(), name: vorlage.name, hintergrund: vorlage.hintergrund,
      eigenerHintergrund: vorlage.eigenerHintergrund,
      elemente: vorlage.elemente.map((el) => ({ ...el, id: neueId(), daten: { ...el.daten } })),
    };
    aktualisiere((d) => ({ ...d, seiten: [...d.seiten, neu] }));
    setSeiteId(neu.id);
  };
  const seitenGalerieUmbenennen = (vId, name) => aktualisiere((d) => ({
    ...d, seitenGalerie: (d.seitenGalerie || []).map((v) => v.id === vId ? { ...v, name } : v),
  }));
  const seitenGalerieLöschen = (vId) => aktualisiere((d) => ({
    ...d, seitenGalerie: (d.seitenGalerie || []).filter((v) => v.id !== vId),
  }));

  return (
    <div style={{ minHeight: "100vh", background: "#FFF7EC" }}>
      <div style={{ maxWidth: 560, margin: "0 auto", padding: 14 }}>
        <header style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 38 }}>{daten.maskottchen}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 800, fontSize: 21, color: daten.farbe }}>Verwaltung</div>
            <div style={{ color: "#8A7F72", fontSize: 13, fontWeight: 600 }}>Alles hier Eingestellte erscheint automatisch auf der Tafel.</div>
          </div>
          <button onClick={zurTafel} style={{ ...knopf, borderRadius: 999 }}>Zur Tafel</button>
        </header>

        {/* ---- Tafelseiten & Elemente ---- */}
        <Abschnitt id="seiten" titel="Tafelseiten & Elemente" emoji="🧩">
          <label style={beschriftung}>Tafelseite auswählen</label>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
            {daten.seiten.map((s, i) => (
              <button key={s.id} onClick={() => setSeiteId(s.id)} style={{
                padding: "9px 14px", borderRadius: 10, fontWeight: 800, fontSize: 15,
                border: s.id === seite.id ? `3px solid ${daten.farbe}` : "2px solid #E5DCCB",
                background: s.id === seite.id ? "#FFF3E6" : "#FFFCF6",
              }}>{i + 1} · {s.name}</button>
            ))}
            {daten.seiten.length < 8 && (
              <button onClick={() => {
                const neu = { id: neueId(), name: `Tafel ${daten.seiten.length + 1}`, hintergrund: "tafel", eigenerHintergrund: "", elemente: [] };
                aktualisiere((d) => ({ ...d, seiten: [...d.seiten, neu] })); setSeiteId(neu.id);
              }} style={{ ...knopf, background: "#3E8E5A" }}>+ Neue Seite</button>
            )}
          </div>

          <label style={beschriftung}>Name der Seite</label>
          <div style={{ display: "flex", gap: 6 }}>
            <input style={{ ...eingabe, flex: 1 }} value={seite.name} onChange={(e) => bearbeiteSeite({ name: e.target.value })} />
            {daten.seiten.length > 1 && (
              <button title="Diese Seite löschen" onClick={() => {
                const übrig = daten.seiten.filter((s) => s.id !== seite.id);
                aktualisiere((d) => ({ ...d, seiten: d.seiten.filter((s) => s.id !== seite.id) }));
                setSeiteId(übrig[0].id);
              }} style={{ ...knopf, background: "#C94F6D", height: 46 }}>🗑️</button>
            )}
          </div>

          <label style={beschriftung}>Hintergrund</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
            {Object.entries(HINTERGRUENDE).map(([k, h]) => (
              <button key={k} title={h.name} onClick={() => bearbeiteSeite({ hintergrund: k, eigenerHintergrund: "" })} style={{
                width: 64, height: 44, borderRadius: 10, background: h.css, backgroundSize: "cover",
                border: seite.hintergrund === k && !seite.eigenerHintergrund ? `4px solid ${daten.farbe}` : "2px solid #E5DCCB",
              }} />
            ))}
          </div>
          <label style={beschriftung}>… oder eigenes Hintergrundbild (Link)</label>
          <input style={eingabe} placeholder="https://…" value={seite.eigenerHintergrund}
            onChange={(e) => bearbeiteSeite({ eigenerHintergrund: e.target.value.trim() })} />

          <button onClick={speichereSeiteInGalerie} style={{ ...knopf, width: "100%", background: "#8B5CB8", marginBottom: 12 }}>
            💾 Diese komplette Seite in die Galerie speichern
          </button>

          <label style={beschriftung}>Element hinzufügen</label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 12 }}>
            {Object.entries(ELEMENT_TYPEN).map(([typ, t]) => (
              <button key={typ} onClick={() => aktualisiere((d) => ({
                ...d, seiten: d.seiten.map((s) => s.id === seite.id ? { ...s, elemente: [...s.elemente, neuesElement(typ)] } : s),
              }))} style={{
                padding: "10px 8px", borderRadius: 10, border: "2px solid #E5DCCB", background: "#FFFCF6",
                fontWeight: 700, fontSize: 14, textAlign: "left",
              }}>{t.emoji} {t.name}</button>
            ))}
          </div>

          <label style={beschriftung}>Elemente auf dieser Seite (auf der Tafel per Finger verschieben)</label>
          {seite.elemente.length === 0 && <div style={{ color: "#8A7F72", fontSize: 14, fontWeight: 600 }}>Noch keine Elemente.</div>}
          {seite.elemente.map((el) => (
            <div key={el.id} style={{ border: "2px solid #E5DCCB", borderRadius: 12, padding: 12, marginBottom: 8, background: "#FFFCF6" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <span style={{ fontWeight: 800 }}>{ELEMENT_TYPEN[el.typ].emoji} {ELEMENT_TYPEN[el.typ].name}</span>
                <span>
                  <button onClick={() => speichereInGalerie(el)} style={{ border: "none", background: "none", fontSize: 18 }} title="In Galerie speichern">💾</button>
                  <button onClick={() => löscheElement(el.id)} style={{ border: "none", background: "none", fontSize: 18 }} title="Löschen">🗑️</button>
                </span>
              </div>
              {el.typ === "notiz" && <>
                <input style={eingabe} placeholder="Titel" value={el.daten.titel} onChange={(e) => bearbeiteElement(el.id, { titel: e.target.value })} />
                <textarea style={{ ...eingabe, minHeight: 70 }} placeholder="Text" value={el.daten.text} onChange={(e) => bearbeiteElement(el.id, { text: e.target.value })} />
              </>}
              {el.typ === "geburtstag" && <>
                <input style={eingabe} placeholder="Name des Geburtstagskindes" value={el.daten.name} onChange={(e) => bearbeiteElement(el.id, { name: e.target.value })} />
                <input style={eingabe} placeholder="Foto-Link (https://…)" value={el.daten.fotoUrl} onChange={(e) => bearbeiteElement(el.id, { fotoUrl: e.target.value.trim() })} />
              </>}
              {el.typ === "bild" && (
                <input style={eingabe} placeholder="Bild-Link (https://…)" value={el.daten.url} onChange={(e) => bearbeiteElement(el.id, { url: e.target.value.trim() })} />
              )}
              {el.typ === "gruppen" && <>
                <label style={beschriftung}>Anzahl Gruppen</label>
                <input type="number" min="2" max="6" style={eingabe} value={el.daten.anzahl}
                  onChange={(e) => bearbeiteElement(el.id, { anzahl: Math.min(6, Math.max(2, Number(e.target.value) || 2)) })} />
              </>}
              {el.typ === "uhr" && (
                <button onClick={() => bearbeiteElement(el.id, { digital: !el.daten.digital })} style={{ ...knopf, background: "#3B82C4" }}>
                  {el.daten.digital ? "→ Analoge Uhr" : "→ Digitale Uhr"}
                </button>
              )}
              {el.typ === "wuerfel" && (
                <div style={{ display: "flex", gap: 6 }}>
                  {[1, 2].map((n) => (
                    <button key={n} onClick={() => bearbeiteElement(el.id, { anzahl: n })} style={{
                      flex: 1, padding: 10, borderRadius: 10, fontWeight: 800,
                      border: (el.daten.anzahl || 1) === n ? `3px solid ${daten.farbe}` : "2px solid #E5DCCB",
                      background: (el.daten.anzahl || 1) === n ? "#FFF3E6" : "#FFFCF6",
                    }}>{n} Würfel</button>
                  ))}
                </div>
              )}
              {el.typ === "gluecksrad" && <>
                <button onClick={() => bearbeiteElement(el.id, { nutzeNamen: !el.daten.nutzeNamen })}
                  style={{ ...knopf, width: "100%", background: "#8B5CB8", marginBottom: 8 }}>
                  {el.daten.nutzeNamen ? "Nutzt: Namensliste der Kinder (umschalten)" : "Nutzt: eigene Einträge (umschalten)"}
                </button>
                {!el.daten.nutzeNamen && <>
                  <textarea style={{ ...eingabe, minHeight: 80 }}
                    value={(el.daten.eintraege || []).join("\n")}
                    onChange={(e) => bearbeiteElement(el.id, { eintraege: e.target.value.split("\n") })} />
                  <div style={{ fontSize: 13, color: "#8A7F72" }}>Ein Eintrag pro Zeile (z. B. Aufgaben, Preise, Themen).</div>
                </>}
              </>}
              {el.typ === "rechnen" && (
                <div style={{ display: "flex", gap: 6 }}>
                  {[20, 100, 1000].map((r) => (
                    <button key={r} onClick={() => bearbeiteElement(el.id, { raum: r })} style={{
                      flex: 1, padding: 10, borderRadius: 10, fontWeight: 800, fontSize: 14,
                      border: (el.daten.raum || 20) === r ? `3px solid ${daten.farbe}` : "2px solid #E5DCCB",
                      background: (el.daten.raum || 20) === r ? "#FFF3E6" : "#FFFCF6",
                    }}>bis {r}</button>
                  ))}
                </div>
              )}
              {el.typ === "galgen" && <>
                <textarea style={{ ...eingabe, minHeight: 80 }}
                  value={(el.daten.woerter || []).join("\n")}
                  onChange={(e) => bearbeiteElement(el.id, { woerter: e.target.value.split("\n") })} />
                <div style={{ fontSize: 13, color: "#8A7F72" }}>Ein Wort pro Zeile – die Tafel wählt zufällig aus.</div>
              </>}
              {el.typ === "quiz" && <>
                {(el.daten.fragen || []).map((f, qi) => (
                  <div key={qi} style={{ border: "2px solid #E5DCCB", borderRadius: 10, padding: 8, marginBottom: 8, background: "#fff" }}>
                    <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
                      <input style={{ ...eingabe, marginBottom: 0, flex: 1, fontWeight: 700 }} placeholder="Frage"
                        value={f.frage}
                        onChange={(e) => bearbeiteElement(el.id, {
                          fragen: el.daten.fragen.map((x, j) => j === qi ? { ...x, frage: e.target.value } : x),
                        })} />
                      <button onClick={() => bearbeiteElement(el.id, { fragen: el.daten.fragen.filter((_, j) => j !== qi) })}
                        style={{ border: "none", background: "none", fontSize: 17 }}>🗑️</button>
                    </div>
                    {f.antworten.map((a, ai) => (
                      <div key={ai} style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4 }}>
                        <button title="Als richtige Antwort markieren"
                          onClick={() => bearbeiteElement(el.id, {
                            fragen: el.daten.fragen.map((x, j) => j === qi ? { ...x, richtig: ai } : x),
                          })}
                          style={{ border: "none", background: "none", fontSize: 20 }}>
                          {f.richtig === ai ? "✅" : "⚪"}
                        </button>
                        <input style={{ ...eingabe, marginBottom: 0, flex: 1 }} placeholder={`Antwort ${String.fromCharCode(65 + ai)}`}
                          value={a}
                          onChange={(e) => bearbeiteElement(el.id, {
                            fragen: el.daten.fragen.map((x, j) => j === qi
                              ? { ...x, antworten: x.antworten.map((y, k) => k === ai ? e.target.value : y) } : x),
                          })} />
                      </div>
                    ))}
                    <div style={{ fontSize: 12, color: "#8A7F72" }}>✅ markiert die richtige Antwort.</div>
                  </div>
                ))}
                <button onClick={() => bearbeiteElement(el.id, {
                  fragen: [...(el.daten.fragen || []), { frage: "", antworten: ["", "", ""], richtig: 0 }],
                })} style={{ ...knopf, width: "100%", background: "#3E8E5A" }}>+ Frage hinzufügen</button>
              </>}
            </div>
          ))}
        </Abschnitt>

        {/* ---- Galerie ---- */}
        <Abschnitt id="galerie" titel={`Galerie (${(daten.galerie || []).length + (daten.seitenGalerie || []).length})`} emoji="📦">
          <div style={{ fontSize: 14, color: "#8A7F72", fontWeight: 600, marginBottom: 10 }}>
            Fertige Elemente hier aufbewahren und jederzeit wieder einfügen.
            Zum Speichern bei einem Element auf 💾 tippen. „Einfügen" legt eine Kopie
            auf die oben ausgewählte Seite (aktuell: <b>{seite.name}</b>).
          </div>

          {/* --- Ganze Tafelseiten --- */}
          <div style={{ fontWeight: 800, fontSize: 16, margin: "4px 0 8px" }}>🗂️ Ganze Tafelseiten</div>
          {(daten.seitenGalerie || []).length === 0 && (
            <div style={{
              border: "2px dashed #E5DCCB", borderRadius: 12, padding: 14, textAlign: "center",
              color: "#8A7F72", fontWeight: 600, marginBottom: 12, fontSize: 14,
            }}>Noch keine Seiten-Vorlagen.<br />Oben „💾 Diese komplette Seite …" antippen.</div>
          )}
          {(daten.seitenGalerie || []).map((v) => (
            <div key={v.id} style={{ border: "2px solid #E5DCCB", borderRadius: 12, padding: 10, marginBottom: 8, background: "#FFFCF6" }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <div style={{
                  width: 52, height: 36, borderRadius: 8, flexShrink: 0,
                  background: v.eigenerHintergrund ? `url(${v.eigenerHintergrund}) center/cover` : (HINTERGRUENDE[v.hintergrund] || HINTERGRUENDE.holz).css,
                  border: "1px solid #E5DCCB",
                }} />
                <input
                  style={{ ...eingabe, marginBottom: 0, flex: 1, fontWeight: 700 }}
                  value={v.name}
                  onChange={(e) => seitenGalerieUmbenennen(v.id, e.target.value)}
                />
                <button onClick={() => seitenGalerieLöschen(v.id)} style={{ border: "none", background: "none", fontSize: 18 }} title="Vorlage löschen">🗑️</button>
              </div>
              <div style={{ fontSize: 13, color: "#8A7F72", margin: "6px 2px 0", fontWeight: 600 }}>
                {v.elemente.length} Element{v.elemente.length === 1 ? "" : "e"}: {v.elemente.map((el) => ELEMENT_TYPEN[el.typ].emoji).join(" ")}
              </div>
              {daten.seiten.length < 8 ? (
                <button onClick={() => seiteAusGalerieEinfuegen(v)} style={{ ...knopf, width: "100%", marginTop: 8, background: "#8B5CB8" }}>
                  → Als neue Tafelseite einfügen
                </button>
              ) : (
                <div style={{ fontSize: 13, color: "#C94F6D", fontWeight: 700, marginTop: 8 }}>
                  Alle 8 Seiten belegt – erst eine Seite löschen.
                </div>
              )}
            </div>
          ))}

          {/* --- Einzelne Elemente --- */}
          <div style={{ fontWeight: 800, fontSize: 16, margin: "14px 0 8px" }}>🧩 Einzelne Elemente</div>
          {(daten.galerie || []).length === 0 && (
            <div style={{
              border: "2px dashed #E5DCCB", borderRadius: 12, padding: 18, textAlign: "center",
              color: "#8A7F72", fontWeight: 600,
            }}>Die Galerie ist noch leer.<br />Speichere ein Element über das 💾-Symbol.</div>
          )}
          {(daten.galerie || []).map((v) => (
            <div key={v.id} style={{ border: "2px solid #E5DCCB", borderRadius: 12, padding: 10, marginBottom: 8, background: "#FFFCF6" }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 24 }}>{ELEMENT_TYPEN[v.typ].emoji}</span>
                <input
                  style={{ ...eingabe, marginBottom: 0, flex: 1, fontWeight: 700 }}
                  value={v.name}
                  onChange={(e) => galerieUmbenennen(v.id, e.target.value)}
                />
                <button onClick={() => galerieLöschen(v.id)} style={{ border: "none", background: "none", fontSize: 18 }} title="Aus Galerie löschen">🗑️</button>
              </div>
              {v.typ === "notiz" && v.daten.text && (
                <div style={{
                  fontSize: 13, color: "#8A7F72", margin: "6px 2px 0", whiteSpace: "nowrap",
                  overflow: "hidden", textOverflow: "ellipsis",
                }}>{v.daten.text}</div>
              )}
              <button onClick={() => ausGalerieEinfuegen(v)} style={{ ...knopf, width: "100%", marginTop: 8 }}>
                → Auf Seite „{seite.name}" einfügen
              </button>
            </div>
          ))}
        </Abschnitt>

        {/* ---- Klasse ---- */}
        <Abschnitt id="klasse" titel="Klasse & Maskottchen" emoji="🎨">
          <label style={beschriftung}>Klassenname</label>
          <input style={eingabe} value={daten.klassenname} onChange={(e) => aktualisiere({ klassenname: e.target.value })} />
          <label style={beschriftung}>Maskottchen</label>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)", gap: 6, marginBottom: 10 }}>
            {MASKOTTCHEN.map((m) => (
              <button key={m} onClick={() => aktualisiere({ maskottchen: m })} style={{
                fontSize: 26, padding: 7, borderRadius: 10, background: "#FFFCF6",
                border: daten.maskottchen === m ? `3px solid ${daten.farbe}` : "2px solid #E5DCCB",
              }}>{m}</button>
            ))}
          </div>
          <label style={beschriftung}>Klassenfarbe</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {FARBEN.map((f) => (
              <button key={f} onClick={() => aktualisiere({ farbe: f })} style={{
                width: 38, height: 38, borderRadius: "50%", background: f,
                border: daten.farbe === f ? "4px solid #3A332C" : "3px solid #fff", boxShadow: "0 2px 4px rgba(0,0,0,.15)",
              }} />
            ))}
          </div>
        </Abschnitt>

        {/* ---- Stundenplan ---- */}
        <Abschnitt id="plan" titel="Stundenplan" emoji="📅">
          {TAGE.map((t) => (
            <div key={t}>
              <label style={beschriftung}>{t} (Fächer mit Komma trennen)</label>
              <input style={eingabe} value={(daten.stundenplan[t] || []).join(", ")}
                onChange={(e) => aktualisiere((d) => ({ ...d, stundenplan: { ...d.stundenplan, [t]: e.target.value.split(",").map((x) => x.trim()).filter(Boolean) } }))} />
            </div>
          ))}
        </Abschnitt>

        {/* ---- Essensplan ---- */}
        <Abschnitt id="essen" titel="Essensplan" emoji="🍽️">
          {TAGE.map((t) => (
            <div key={t}>
              <label style={beschriftung}>{t}</label>
              <input style={eingabe} value={daten.essensplan[t] || ""}
                onChange={(e) => aktualisiere((d) => ({ ...d, essensplan: { ...d.essensplan, [t]: e.target.value } }))} />
            </div>
          ))}
        </Abschnitt>

        {/* ---- Kinder & Punkte ---- */}
        <Abschnitt id="punkte" titel="Kinder & Punkte" emoji="⭐">
          {daten.schueler.map((s, i) => (
            <div key={i} style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
              <input style={{ ...eingabe, marginBottom: 0, flex: 1 }} value={s.name}
                onChange={(e) => aktualisiere((d) => ({ ...d, schueler: d.schueler.map((x, j) => j === i ? { ...x, name: e.target.value } : x) }))} />
              <button onClick={() => aktualisiere((d) => ({ ...d, schueler: d.schueler.map((x, j) => j === i ? { ...x, punkte: Math.max(0, x.punkte - 1) } : x) }))}
                style={{ ...knopf, background: "#fff", color: daten.farbe, border: `2px solid ${daten.farbe}`, padding: "9px 13px" }}>−</button>
              <span style={{ fontWeight: 800, minWidth: 26, textAlign: "center" }}>{s.punkte}</span>
              <button onClick={() => aktualisiere((d) => ({ ...d, schueler: d.schueler.map((x, j) => j === i ? { ...x, punkte: x.punkte + 1 } : x) }))}
                style={{ ...knopf, padding: "9px 13px" }}>+</button>
              <button onClick={() => aktualisiere((d) => ({ ...d, schueler: d.schueler.filter((_, j) => j !== i) }))}
                style={{ border: "none", background: "none", fontSize: 17 }}>🗑️</button>
            </div>
          ))}
          <button onClick={() => aktualisiere((d) => ({ ...d, schueler: [...d.schueler, { name: "Neues Kind", punkte: 0 }] }))}
            style={{ ...knopf, background: "#3E8E5A", width: "100%" }}>+ Kind hinzufügen</button>
        </Abschnitt>

        {/* ---- Sternen-Challenge ---- */}
        <Abschnitt id="challenge" titel="Sternen-Challenge" emoji="🌟">
          <div style={{ fontSize: 14, color: "#8A7F72", fontWeight: 600, marginBottom: 10 }}>
            Punkte sammeln → Sterne verdienen → bei 5 Sternen gibt es die Wochen-Belohnung.
            Das Element „🌟 Sternen-Challenge" oben zur Tafelseite hinzufügen, damit es angezeigt wird.
          </div>
          <label style={beschriftung}>Punkte pro Stern</label>
          <input type="number" min="1" style={eingabe} value={(daten.belohnung || {}).punkteProStern || 5}
            onChange={(e) => aktualisiere((d) => ({ ...d, belohnung: { ...d.belohnung, punkteProStern: Math.max(1, Number(e.target.value) || 1) } }))} />
          <label style={beschriftung}>Wochen-Belohnung bei 5 Sternen</label>
          <input style={eingabe} placeholder="z. B. Extra-Pause am Freitag 🎉" value={(daten.belohnung || {}).wochenBelohnung || ""}
            onChange={(e) => aktualisiere((d) => ({ ...d, belohnung: { ...d.belohnung, wochenBelohnung: e.target.value } }))} />
          <label style={beschriftung}>Wofür gibt es Punkte? (eine Kategorie pro Zeile)</label>
          <textarea style={{ ...eingabe, minHeight: 70 }} value={((daten.belohnung || {}).kategorien || []).join("\n")}
            onChange={(e) => aktualisiere((d) => ({ ...d, belohnung: { ...d.belohnung, kategorien: e.target.value.split("\n").map((z) => z.trim()).filter(Boolean) } }))} />

          <label style={beschriftung}>🏅 Lob-Sprüche für die Ehrenwand (einer pro Zeile)</label>
          <textarea style={{ ...eingabe, minHeight: 70 }} value={((daten.belohnung || {}).spruecheLob || []).join("\n")}
            onChange={(e) => aktualisiere((d) => ({ ...d, belohnung: { ...d.belohnung, spruecheLob: e.target.value.split("\n").map((z) => z.trim()).filter(Boolean) } }))} />
          <div style={{ fontSize: 13, color: "#8A7F72", marginBottom: 10 }}>
            Das Element „🏅 Ehrenwand (nur positiv)" zeigt nur Namen mit Punkten, in täglich wechselnder
            Reihenfolge (nicht sortiert nach Punktzahl) – so steht nicht immer dasselbe Kind oben.
          </div>

          <label style={beschriftung}>⚡ Schnell-Vergabe: Name antippen = +1 Punkt</label>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 6, marginBottom: 8 }}>
            {daten.schueler.map((s, i) => {
              const pps = Math.max(1, (daten.belohnung || {}).punkteProStern || 5);
              const sterne = Math.min(5, Math.floor(s.punkte / pps));
              return (
                <button key={i} onClick={() => aktualisiere((d) => ({
                  ...d, schueler: d.schueler.map((x, j) => j === i ? { ...x, punkte: x.punkte + 1 } : x),
                }))} style={{
                  padding: "10px 4px", borderRadius: 10, border: "2px solid #E5DCCB", background: sterne >= 5 ? "#FFF3C4" : "#FFFCF6",
                  fontWeight: 800, fontSize: 14,
                }}>
                  {s.name}<br />
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#8A7F72" }}>{s.punkte} P · {"⭐".repeat(sterne) || "–"}</span>
                </button>
              );
            })}
          </div>
          <button onClick={() => aktualisiere((d) => ({ ...d, schueler: d.schueler.map((x) => ({ ...x, punkte: x.punkte + 1 })) }))}
            style={{ ...knopf, width: "100%", background: "#3E8E5A", marginBottom: 8 }}>
            🎉 Ganze Klasse +1 Punkt
          </button>
          <WochenReset aktualisiere={aktualisiere} />
        </Abschnitt>

        {/* ---- Ziele ---- */}
        <Abschnitt id="ziele" titel="Ziele der Woche" emoji="🎯">
          <textarea style={{ ...eingabe, minHeight: 90 }} value={daten.ziele.join("\n")}
            onChange={(e) => aktualisiere({ ziele: e.target.value.split("\n").map((z) => z.trim()).filter(Boolean) })} />
          <div style={{ fontSize: 13, color: "#8A7F72" }}>Ein Ziel pro Zeile.</div>
        </Abschnitt>
      </div>
    </div>
  );
}

function WochenReset({ aktualisiere }) {
  const [bestätigen, setBestätigen] = useState(false);
  useEffect(() => {
    if (!bestätigen) return;
    const t = setTimeout(() => setBestätigen(false), 4000);
    return () => clearTimeout(t);
  }, [bestätigen]);
  return (
    <button onClick={() => {
      if (!bestätigen) { setBestätigen(true); return; }
      aktualisiere((d) => ({ ...d, schueler: d.schueler.map((x) => ({ ...x, punkte: 0 })) }));
      setBestätigen(false);
    }} style={{
      width: "100%", border: "none", borderRadius: 12, padding: "11px 16px", fontSize: 15,
      fontWeight: 800, color: "#fff", background: bestätigen ? "#D64545" : "#C94F6D",
    }}>
      {bestätigen ? "Wirklich? Nochmal tippen zum Zurücksetzen!" : "🔄 Neue Woche starten (alle Punkte auf 0)"}
    </button>
  );
}

    ReactDOM.render(<TafelBaukasten />, document.getElementById('root'));
  </script>
</body>
</html>
